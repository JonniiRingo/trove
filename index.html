<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trove | Rare Treasures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-logo">TROVE</div>
        <div class="nav-links">
            <a href="#gallery-view">Shop</a>
        </div>
    </nav>

    <header class="hero-section">
        <div class="hero-overlay">
            <h1 class="title">RARE TREASURES, REFINE TASTE.</h1>
            <p class="hero-description">Discover and auction remarkable second-hand and production prints.</p>
        </div>
    </header>

    <main class="gallery spa-stage" id="gallery-view">
        
        <section id="showroom-state">
            <div id="card-container">
                </div>
            
            <div class="footer">
                <button>Load More</button>
            </div>
        </section>

        <section id="detail-view" style="display: none;">
            <div class="detail-container">
                <button id="back-btn" onclick="hideDetailView()">← Back to Showroom</button>
            </div>
        </section>

    </main>

    <script src="scripts.js"></script>
</body>
</html>
