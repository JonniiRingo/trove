<!doctype html>
<html>
  <head>
    <title>TROVE.COM | Curated Art</title>
    <meta name="description" content="Rare Treasures, Refined Tastes." />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">TROVE.COM</h1>
      <p class="subtitle">RARE TREASURES, REFINED TASTES.</p>
    </header>
    
    <div id="card-container"></div>
    
    <div class="card" style="display: none">
      <div class="card-image-wrapper">
        <img src="" alt="Artwork" />
      </div>
      <div class="card-content">
        <h2>Artwork Title</h2>
        <p class="artist-name">Artist Name</p>
        <div class="card-details">
          <span class="category-tag">Category</span>
          <span class="price-tag">$0.00</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
